<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Manage My Price Alerts — Ahmedabad Gold & Silver Rates</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .ma-wrap   { max-width: 720px; margin: 2.5rem auto; padding: 0 1rem; }
    .ma-back   { color: var(--acc); text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 1rem; }
    .ma-card   { background: var(--card); border: 1px solid var(--acc-border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.25rem; }
    .ma-title  { font-size: 1.4rem; font-weight: 700; margin: 0 0 .35rem; }
    .ma-sub    { color: var(--muted); font-size: 13px; margin: 0 0 1.25rem; }
    .ma-form   { display: flex; gap: .5rem; flex-wrap: wrap; }
    .ma-form input { flex: 1; min-width: 200px; background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); color: var(--text); padding: .75rem .85rem; border-radius: 8px; font-size: 14px; }
    .ma-form input:focus { outline: none; border-color: var(--acc); }
    .ma-form button { background: var(--acc); color: #000; border: 0; padding: .75rem 1.4rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .ma-form button:hover { filter: brightness(1.1); }
    .ma-form button:disabled { opacity: .5; cursor: not-allowed; }
    .ma-msg    { margin-top: 1rem; padding: .65rem .85rem; border-radius: 8px; font-size: 13px; display: none; }
    .ma-msg.err { background: rgba(239,68,68,0.1); color: #f87171; display: block; }
    .ma-msg.ok  { background: rgba(34,197,94,0.1); color: #4ade80; display: block; }
    .ma-alert  { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--acc-border); border-radius: 12px; margin-bottom: .75rem; background: rgba(255,255,255,0.02); flex-wrap: wrap; }
    .ma-alert.inactive { opacity: .5; }
    .ma-alert-info { flex: 1; min-width: 220px; }
    .ma-alert-jeweller { font-weight: 600; font-size: 14px; margin-bottom: .25rem; }
    .ma-alert-detail { font-size: 12px; color: var(--muted); }
    .ma-tag-on  { background: rgba(34,197,94,0.15); color: #4ade80;  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .ma-tag-off { background: rgba(160,168,184,0.15); color: var(--muted); font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .ma-cancel { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); padding: .5rem 1rem; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .ma-cancel:hover { background: rgba(239,68,68,0.2); }
    .ma-cancel:disabled { opacity: .5; cursor: not-allowed; }
    .ma-empty { color: var(--muted); font-size: 13px; font-style: italic; text-align: center; padding: 1.5rem; }
  </style>
</head>
<body>
  <div class="ma-wrap">
    <a class="ma-back" href="index.html">← Back to dashboard</a>

    <div class="ma-card">
      <h1 class="ma-title">🔔 Manage your price alerts</h1>
      <p class="ma-sub">Enter the email you used when subscribing to see and cancel your alerts.</p>

      <form id="lookupForm" class="ma-form">
        <input id="email" type="email" placeholder="you@example.com" required />
        <button type="submit" id="lookupBtn">Show my alerts</button>
      </form>

      <div id="msg" class="ma-msg"></div>
    </div>

    <div id="alertsCard" class="ma-card" style="display:none">
      <h3 style="margin:0 0 1rem;font-size:1.1rem;font-weight:600">Your alerts</h3>
      <div id="alertsList"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const API_BASE = window.API_BASE || 'http://127.0.0.1:4000';

    const form   = document.getElementById('lookupForm');
    const btn    = document.getElementById('lookupBtn');
    const msg    = document.getElementById('msg');
    const card   = document.getElementById('alertsCard');
    const list   = document.getElementById('alertsList');

    function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

    async function loadAlerts(email) {
      msg.className = 'ma-msg';
      try {
        const res = await fetch(`${API_BASE}/api/alerts?email=${encodeURIComponent(email)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Failed to load alerts');
        }
        const rows = await res.json();
        renderAlerts(rows, email);
      } catch (err) {
        msg.className   = 'ma-msg err';
        msg.textContent = err.message;
        card.style.display = 'none';
      }
    }

    function renderAlerts(rows, email) {
      card.style.display = 'block';
      if (!rows.length) {
        list.innerHTML = `<div class="ma-empty">No alerts found for <strong>${email}</strong>. <a href="index.html" style="color:var(--acc)">Set one up →</a></div>`;
        return;
      }

      list.innerHTML = rows.map(a => `
        <div class="ma-alert ${a.active ? '' : 'inactive'}" data-id="${a.id}">
          <div class="ma-alert-info">
            <div class="ma-alert-jeweller">
              ${a.jeweller_name || 'Any Ahmedabad Jeweller'}
              <span class="${a.active ? 'ma-tag-on' : 'ma-tag-off'}" style="margin-left:.4rem">${a.active ? 'ACTIVE' : 'INACTIVE'}</span>
            </div>
            <div class="ma-alert-detail">
              Notify when <strong>${(a.alert_type || '22k').toUpperCase()}</strong> drops to <strong>${fmt(a.threshold_price)}/gram</strong>
              · created ${new Date(a.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}
            </div>
          </div>
          ${a.active ? `<button class="ma-cancel" onclick="cancelAlert(${a.id})">Cancel alert</button>` : '<span class="ma-alert-detail" style="font-style:italic">Already triggered or cancelled</span>'}
        </div>
      `).join('');
    }

    async function cancelAlert(id) {
      if (!confirm('Cancel this price alert? You will stop receiving emails for it.')) return;
      const row = document.querySelector(`.ma-alert[data-id="${id}"]`);
      const btn = row?.querySelector('.ma-cancel');
      if (btn) { btn.disabled = true; btn.textContent = 'Cancelling…'; }

      try {
        const res  = await fetch(`${API_BASE}/api/alerts/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to cancel');

        msg.className   = 'ma-msg ok';
        msg.textContent = data.message || 'Alert cancelled.';
        loadAlerts(document.getElementById('email').value.trim());
      } catch (err) {
        msg.className   = 'ma-msg err';
        msg.textContent = err.message;
        if (btn) { btn.disabled = false; btn.textContent = 'Cancel alert'; }
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email || !email.includes('@')) {
        msg.className = 'ma-msg err'; msg.textContent = 'Please enter a valid email.';
        return;
      }
      msg.className = 'ma-msg'; msg.textContent = '';
      btn.disabled = true; btn.textContent = 'Loading…';
      loadAlerts(email).finally(() => { btn.disabled = false; btn.textContent = 'Show my alerts'; });
    });

    // Pre-fill from ?email= so confirmation emails can deep-link here
    const params = new URLSearchParams(window.location.search);
    const pre    = params.get('email');
    if (pre) {
      document.getElementById('email').value = pre;
      form.dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>

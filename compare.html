<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1e" />
  <title>Compare jewellers — SonaToday</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .cmp-wrap   { max-width: 1100px; margin: 1.25rem auto 4rem; padding: 0 1rem; }
    .cmp-back   { color: var(--muted); text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 1rem; }
    .cmp-back:hover { color: var(--acc); }
    .cmp-head   { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
    .cmp-head h1 { margin: 0; font-size: 1.4rem; font-weight: 700; }
    .cmp-head .sub { color: var(--muted); font-size: 12px; margin-top: .15rem; }
    .cmp-controls { display: flex; gap: .5rem; align-items: center; }
    .cmp-controls input { background: rgba(0,0,0,0.25); border: 1px solid var(--acc-border); color: var(--text); padding: .45rem .7rem; border-radius: 8px; font-size: 13px; width: 80px; }
    .cmp-controls select { background: rgba(0,0,0,0.25); border: 1px solid var(--acc-border); color: var(--text); padding: .45rem .7rem; border-radius: 8px; font-size: 13px; }

    /* Two-card side-by-side grid (stacks on mobile) */
    .cmp-grid    { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 760px) { .cmp-grid { grid-template-columns: 1fr; } }
    .cmp-col     { background: var(--card); border: 1px solid var(--acc-border); border-radius: 16px; overflow: hidden; }
    .cmp-photo   { height: 140px; background: rgba(255,255,255,0.04) center/cover; border-bottom: 1px solid var(--acc-border); }
    .cmp-body    { padding: 1.1rem 1.2rem 1.2rem; }
    .cmp-name    { font-size: 1.15rem; font-weight: 700; margin: 0 0 .15rem; }
    .cmp-area    { color: var(--muted); font-size: 12px; margin-bottom: .85rem; }
    .cmp-row     { display: flex; justify-content: space-between; padding: .55rem 0; border-top: 1px solid rgba(255,255,255,0.06); font-size: 14px; }
    .cmp-row:first-of-type { border-top: 0; }
    .cmp-row .lbl  { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .3px; }
    .cmp-row .val  { font-weight: 600; }
    .cmp-row.win .val   { color: #4ade80; }
    .cmp-row.win .val::after  { content: ' ✓'; font-size: .85em; }
    .cmp-row.tie .val   { color: var(--text); }
    .cmp-row.miss .val  { color: var(--muted); font-style: italic; font-weight: 400; }
    .cmp-section-head { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 1.25rem 0 .3rem; }
    .cmp-actions { display: flex; gap: .5rem; margin-top: 1rem; flex-wrap: wrap; }
    .cmp-actions a { flex: 1; min-width: 100px; text-align: center; background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); color: var(--text); padding: .55rem; border-radius: 8px; text-decoration: none; font-size: 13px; }
    .cmp-actions a:hover { border-color: var(--acc); color: var(--acc); }

    /* Bottom-line summary card */
    .cmp-summary { margin-top: 1.25rem; padding: 1.1rem 1.25rem; background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.03)); border: 1px solid rgba(212,175,55,0.3); border-radius: 14px; }
    .cmp-summary h3 { margin: 0 0 .35rem; font-size: 1.05rem; font-weight: 700; color: var(--acc); }
    .cmp-summary p  { margin: 0; font-size: 14px; line-height: 1.55; color: var(--text); }
    .cmp-summary .bot-row { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: .85rem; }
    .cmp-summary .bot-row .stat { background: rgba(0,0,0,0.2); border: 1px solid var(--acc-border); border-radius: 10px; padding: .55rem .8rem; flex: 1; min-width: 140px; }
    .cmp-summary .stat .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .cmp-summary .stat .stat-val { font-size: 1.05rem; font-weight: 700; margin-top: .2rem; }

    .cmp-share-btn { width: 100%; background: #25D366; color: #fff; border: 0; padding: .8rem; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .cmp-share-btn:hover { filter: brightness(1.08); }

    .cmp-empty { padding: 3rem 1rem; text-align: center; color: var(--muted); }
    .cmp-empty a { color: var(--acc); text-decoration: none; }
  </style>
</head>
<body>
  <div class="cmp-wrap">
    <a class="cmp-back" href="index.html">← Back to all jewellers</a>

    <div class="cmp-head">
      <div>
        <h1>Side-by-side comparison</h1>
        <div class="sub" id="cmpDate"></div>
      </div>
      <div class="cmp-controls">
        <label style="font-size:12px;color:var(--muted)">For
          <input id="cmpWeight" type="number" inputmode="decimal" min="0.1" step="0.1" value="10" />g
          <select id="cmpPurity">
            <option value="22">22K</option>
            <option value="24">24K</option>
          </select>
        </label>
      </div>
    </div>

    <div id="cmpRoot"></div>
  </div>

  <script src="/config.js?v=5"></script>
  <script src="compare.js?v=1"></script>
</body>
</html>

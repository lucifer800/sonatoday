# Render Blueprint — auto-deploys this repo as a single web service.
# Render reads this file from the repo root on every git push.
# Docs: https://render.com/docs/blueprint-spec
#
# ⚠ Free tier has NO persistent disk. The SQLite DB lives in /tmp
# and resets every redeploy. The 12 jewellers re-seed on every boot
# (seedJewellers.js is idempotent), so the public site always looks
# fine — but user reviews, price alerts, and scraped price_history
# are lost on each redeploy. Upgrade to Starter ($7/mo) when you
# want persistence.

services:
  - type: web
    name: sonatoday
    runtime: node
    plan: free                  # 750 hrs/month, sleeps after 15 min idle
    region: singapore           # closest free region for India
    buildCommand: cd backend && npm install
    # Seed re-runs every boot to populate the 12 jewellers (idempotent).
    # /tmp is the only writable path on Render free — DB goes there.
    startCommand: cd backend && node seedJewellers.js && node server.js
    healthCheckPath: /api/live-price
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      # /tmp is writable on Render free; data is ephemeral but survives
      # the lifetime of a single container instance.
      - key: DATABASE_PATH
        value: /tmp/goldrates.db
      # Secrets — set actual values in Render dashboard, not here.
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOLDAPI_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true     # Render generates a long random string once
      - key: SITE_URL
        sync: false             # set this to your final render.com URL

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Jeweller — Ahmedabad Gold</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f5f2ea">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <meta property="og:type"         content="website">
  <meta property="og:site_name"    content="Ahmedabad Gold Rates">
  <meta property="og:title"        content="Ahmedabad Gold Rates — Jeweller Profile">
  <meta property="og:description"  content="Today's verified rate, hours, location and reviews.">
  <meta property="og:image"        content="/api/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card"        content="summary_large_image">

  <style>
    .jp-wrap { max-width: 1180px; margin: 0 auto; padding: 0 3.5% 4rem; }
    .jp-crumb { padding: 24px 0 12px; font-size: 12px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; font-weight: 500; }
    .jp-crumb a { color: var(--muted); text-decoration: none; border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
    .jp-crumb a:hover { color: var(--acc); border-color: var(--acc); }

    /* Editorial hero */
    .jp-hero { padding: 20px 0 56px; border-bottom: 1px solid var(--acc-border); display: grid; grid-template-columns: 1.4fr 1fr; gap: 3.5rem; align-items: start; }
    @media (max-width: 900px) { .jp-hero { grid-template-columns: 1fr; gap: 2rem; } }
    .jp-hero-l .eyebrow { font-size: 11px; letter-spacing: .32em; color: var(--acc); font-weight: 500; text-transform: uppercase; margin-bottom: 14px; }
    .jp-name { font-family: var(--fh); font-weight: 400; font-size: 54px; line-height: 1.03; letter-spacing: -.03em; color: var(--white); margin: 0; }
    .jp-sym { display: none; }
    .jp-verified {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(74,122,59,.1); color: var(--green); border: 1px solid rgba(74,122,59,.24);
      padding: 4px 12px; border-radius: 3px; font-size: 10.5px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    }
    .jp-area { color: var(--muted); font-size: 15px; margin-top: 24px; line-height: 1.6; max-width: 460px; }
    .jp-about { color: var(--muted); font-size: 14.5px; line-height: 1.7; margin: 22px 0 0; max-width: 460px; }
    .jp-shop-photo { height: 300px; background: var(--navy3) center/cover; margin-top: 26px; border-radius: 4px; }
    @media (max-width: 900px) { .jp-shop-photo { height: 200px; } }

    /* Right price card (mirrors the home hero) */
    .jp-price-card {
      background: var(--navy3);
      border-top: 2px solid var(--acc);
      padding: 32px 32px 26px;
      min-height: 260px;
    }
    .jp-price-eyebrow { font-size: 10.5px; letter-spacing: .3em; color: var(--acc); font-weight: 500; text-transform: uppercase; margin-bottom: 12px; }
    .jp-price-24 { font-family: var(--fh); font-size: 54px; font-weight: 400; color: var(--white); letter-spacing: -.025em; line-height: 1; }
    .jp-price-delta { margin-top: 8px; font-size: 12.5px; color: var(--muted); }
    .jp-price-delta .up { color: var(--green); font-weight: 600; }
    .jp-price-grid { margin-top: 26px; padding-top: 20px; border-top: 1px solid var(--acc-border); display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .jp-price-grid .lbl { font-size: 10px; letter-spacing: .22em; color: var(--muted); font-weight: 500; text-transform: uppercase; }
    .jp-price-grid .val { font-family: var(--fh); font-size: 22px; margin-top: 4px; color: var(--white); font-weight: 400; letter-spacing: -.01em; }
    .jp-rank {
      margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--acc-border);
      font-size: 11.5px; color: var(--muted); font-style: italic;
    }
    .jp-rank b { font-style: normal; color: var(--acc); font-weight: 600; }

    /* Credibility badges row */
    .cred-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 26px; }
    .cred-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--navy2); border: 1px solid var(--acc-border); color: var(--white);
      padding: 6px 12px; border-radius: 3px; font-size: 11.5px; font-weight: 500; letter-spacing: .06em;
      text-decoration: none; transition: border-color .2s, color .2s;
    }
    .cred-badge:hover { border-color: var(--acc); color: var(--acc); }
    .cred-badge.cred-gold { background: rgba(160,124,59,.06); border-color: rgba(160,124,59,.28); color: var(--acc); }
    .cred-badge.cred-wa { background: rgba(37,211,102,.08); border-color: rgba(37,211,102,.3); color: #1a8f4a; }
    .cred-badge.cred-wa:hover { background: rgba(37,211,102,.14); color: #1a8f4a; }

    /* Section header */
    .jp-section {
      padding: 56px 0 32px;
      display: grid; grid-template-columns: 1.4fr 3fr; gap: 3rem; align-items: start;
      border-top: 1px solid var(--acc-border);
    }
    @media (max-width: 900px) { .jp-section { grid-template-columns: 1fr; gap: 1.25rem; } }
    .jp-section-hd .num { font-size: 11px; letter-spacing: .32em; color: var(--acc); font-weight: 500; text-transform: uppercase; margin-bottom: 10px; }
    .jp-section-hd h2 { margin: 0; font-family: var(--fh); font-weight: 400; font-size: 32px; letter-spacing: -.025em; color: var(--white); line-height: 1.1; }
    .jp-section-hd p { margin: 14px 0 0; font-size: 13.5px; line-height: 1.65; color: var(--muted); max-width: 320px; }

    /* Chart section */
    .jp-range-bar { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
    .jp-range-btn {
      background: transparent; border: 1px solid var(--acc-border); color: var(--muted);
      padding: 6px 12px; border-radius: 3px; font-size: 11px; font-weight: 500; letter-spacing: .1em;
      cursor: pointer; transition: color .15s, border-color .15s, background .15s;
    }
    .jp-range-btn:hover { color: var(--white); border-color: var(--hair-strong); }
    .jp-range-btn.active { background: var(--white); color: var(--navy2); border-color: var(--white); }
    .jp-range-legend { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .jp-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

    /* Reviews */
    .jp-review {
      padding: 18px 22px; background: var(--navy2); border: 1px solid var(--acc-border);
      border-left: 2px solid var(--acc); border-radius: 3px; margin-bottom: 12px;
    }
    .jp-review-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .jp-review-name { font-weight: 600; font-size: 14px; color: var(--white); }
    .jp-review-date { font-size: 11px; color: var(--muted); letter-spacing: .04em; }
    .jp-review-text { font-size: 13.5px; color: var(--white); line-height: 1.65; }
    .jp-verified-tag {
      background: rgba(74,122,59,.1); color: var(--green); border: 1px solid rgba(74,122,59,.24);
      font-size: 9.5px; padding: 2px 8px; border-radius: 3px; margin-left: 8px; letter-spacing: .12em; font-weight: 600; text-transform: uppercase;
    }

    /* Alert form */
    .jp-alert-form { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .jp-alert-form input, .jp-alert-form select {
      background: var(--navy2); border: 1px solid var(--acc-border); color: var(--white);
      padding: 11px 14px; border-radius: 3px; font-size: 13.5px; font-family: inherit;
    }
    .jp-alert-form input { flex: 1; min-width: 180px; }
    .jp-alert-form input:focus, .jp-alert-form select:focus { outline: none; border-color: var(--acc); box-shadow: 0 0 0 3px rgba(160,124,59,.12); }
    .jp-alert-form button {
      background: var(--white); color: var(--navy2); border: 0; padding: 11px 22px;
      border-radius: 3px; font-weight: 500; font-size: 13.5px; letter-spacing: .04em; cursor: pointer; transition: background .15s;
    }
    .jp-alert-form button:hover { background: #000; }

    .jp-msg { margin-top: 12px; font-size: 13px; padding: 10px 14px; border-radius: 3px; display: none; }
    .jp-msg.ok { background: rgba(74,122,59,.1); color: var(--green); border: 1px solid rgba(74,122,59,.24); display: block; }
    .jp-msg.err { background: rgba(164,74,58,.08); color: var(--red); border: 1px solid rgba(164,74,58,.24); display: block; }

    .jp-empty { color: var(--muted); font-size: 13.5px; font-style: italic; }

    /* Photos gallery */
    .jp-photos { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
    .jp-photo { aspect-ratio: 4/3; overflow: hidden; background: var(--navy3); border: 1px solid var(--acc-border); cursor: pointer; transition: transform .15s; border-radius: 3px; }
    .jp-photo:hover { transform: scale(1.015); }
    .jp-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Hours */
    .jp-hours-grid { display: grid; grid-template-columns: 100px 1fr; gap: 8px 24px; font-size: 13.5px; }
    .jp-hours-grid .day { color: var(--muted); font-weight: 500; letter-spacing: .04em; }
    .jp-hours-grid .time { color: var(--white); font-family: var(--fm); }
    .jp-hours-grid .today { color: var(--acc); font-weight: 600; }

    .jp-map { width: 100%; height: 320px; border: 1px solid var(--acc-border); border-radius: 3px; }
  </style>
</head>

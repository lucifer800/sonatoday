<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Jeweller Profile — Ahmedabad Gold & Silver Rates</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D4AF37">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">

  <!-- Open Graph fallback. Express middleware rewrites these per ?id=N. -->
  <meta property="og:type"         content="website">
  <meta property="og:site_name"    content="Ahmedabad Gold Rates">
  <meta property="og:title"        content="Ahmedabad Gold Rates — Jeweller Profile">
  <meta property="og:description"  content="Today's verified rates, working hours, location and reviews.">
  <meta property="og:image"        content="/api/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card"        content="summary_large_image">
  <style>
    .jp-wrap { max-width: 980px; margin: 2rem auto; padding: 0 1rem; }
    .jp-back { color: var(--acc); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: .35rem; margin-bottom: 1rem; }
    .jp-back:hover { opacity: .8; }
    .jp-card { background: var(--card); border: 1px solid var(--acc-border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.25rem; }
    /* Shop photo banner (top of profile, when jeweller uploads one) */
    .jp-photo { height: 200px; background: rgba(255,255,255,0.04) center/cover; border-radius: 12px; margin: -.5rem 0 1.25rem; border: 1px solid var(--acc-border); }
    @media (max-width: 600px) { .jp-photo { height: 150px; } }
    /* Credibility badge row (BIS / GST / WhatsApp) */
    .cred-row    { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .85rem; padding-top: .85rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .cred-badge  { display: inline-flex; align-items: center; gap: .35rem; background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); color: var(--text); padding: .35rem .65rem; border-radius: 8px; font-size: 12px; font-weight: 500; text-decoration: none; }
    .cred-badge.cred-gold { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.35); color: var(--acc); }
    .cred-badge.cred-wa   { background: rgba(37,211,102,0.1); border-color: rgba(37,211,102,0.35); color: #25D366; }
    .cred-badge.cred-wa:hover { background: rgba(37,211,102,0.18); }
    /* Chart time-range selector (1W / 1M / 3M / 1Y / All) */
    .jp-range-bar    { display: flex; align-items: center; gap: .35rem; flex-wrap: wrap; margin-bottom: .65rem; }
    .jp-range-btn    { background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); color: var(--muted); padding: .3rem .65rem; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: .3px; cursor: pointer; transition: all .12s; }
    .jp-range-btn:hover { color: var(--text); border-color: var(--acc); }
    .jp-range-btn.active { background: var(--acc); color: #000; border-color: var(--acc); }
    .jp-range-legend { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: .35rem; }
    .jp-dot   { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: .25rem; vertical-align: middle; }
    .jp-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .jp-name { font-size: 1.85rem; font-weight: 700; margin: 0 0 .25rem; }
    .jp-area { color: var(--muted); font-size: 14px; }
    .jp-sym  { display: inline-block; background: var(--acc-dim); color: var(--acc); padding: .25rem .65rem; border-radius: 6px; font-weight: 600; font-size: 13px; margin-left: .5rem; }
    .jp-verified { background: linear-gradient(135deg,#1a8b4a,#22c55e); color: #fff; padding: .35rem .75rem; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .jp-rates { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .jp-rate { background: rgba(255,255,255,0.02); border: 1px solid var(--acc-border); border-radius: 12px; padding: 1rem; }
    .jp-rate-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .jp-rate-val { font-size: 1.6rem; font-weight: 700; color: var(--acc); margin-top: .35rem; }
    .jp-rate-sub { font-size: 12px; color: var(--muted); }
    .jp-section-title { font-size: 1.15rem; font-weight: 600; margin: 0 0 1rem; }
    .jp-review { border-left: 3px solid var(--acc); padding: .75rem 1rem; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: .75rem; }
    .jp-review-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .35rem; }
    .jp-review-name { font-weight: 600; font-size: 14px; }
    .jp-review-date { font-size: 11px; color: var(--muted); }
    .jp-review-text { font-size: 13px; color: var(--text); line-height: 1.5; }
    .jp-verified-tag { background: #1a8b4a; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: .35rem; }
    .jp-alert-form { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
    .jp-alert-form input, .jp-alert-form select { background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); color: var(--text); padding: .6rem .75rem; border-radius: 8px; font-size: 13px; }
    .jp-alert-form input { flex: 1; min-width: 180px; }
    .jp-alert-form button { background: var(--acc); color: #000; border: 0; padding: .6rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .jp-alert-form button:hover { filter: brightness(1.1); }
    .jp-msg { margin-top: .75rem; font-size: 13px; padding: .65rem .85rem; border-radius: 8px; display: none; }
    .jp-msg.ok  { background: rgba(34,197,94,0.1);  color: #4ade80; display: block; }
    .jp-msg.err { background: rgba(239,68,68,0.1);  color: #f87171; display: block; }
    .jp-empty { color: var(--muted); font-size: 13px; font-style: italic; }
    .jp-photos { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .75rem; }
    .jp-photo  { aspect-ratio: 4/3; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); cursor: pointer; transition: transform .2s; }
    .jp-photo:hover { transform: scale(1.02); }
    .jp-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .jp-hours-grid { display: grid; grid-template-columns: 80px 1fr; gap: .5rem .85rem; font-size: 13px; }
    .jp-hours-grid .day   { color: var(--muted); font-weight: 500; }
    .jp-hours-grid .time  { color: var(--text); }
    .jp-hours-grid .today { color: var(--acc); font-weight: 600; }
    .jp-map    { width: 100%; height: 320px; border: 0; border-radius: 12px; }
    .jp-about  { color: var(--text); font-size: 13px; line-height: 1.6; margin: 0; }
    .jp-cols   { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 720px) { .jp-cols { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="jp-wrap">
    <a class="jp-back" href="index.html">← Back to all jewellers</a>
    <div id="jpContent">Loading…</div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/config.js?v=4"></script>
  <script src="data.js"></script>
  <script src="jeweller.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Invoice — SonaToday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=Inter:wght@400;500;600&display=swap" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --ink: #1B1A17;
      --paper: #FAF7F0;
      --ochre: #A87833;
      --ochre-soft: #C39A57;
      --rule: #E4DFD3;
      --rule-strong: #C8C1B1;
      --mute: #6E6A61;
      --f-serif: 'Fraunces', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --f-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body { font-family: var(--f-sans); background: #EBE7DD; color: var(--ink); padding: 1.25rem; -webkit-font-smoothing: antialiased; }

    /* Action toolbar sits above the paper — restrained, no gradients */
    .actions { max-width: 780px; margin: 0 auto 1rem; display: flex; gap: .5rem; flex-wrap: wrap; }
    .actions button, .actions a {
      flex: 1; padding: .75rem 1rem; border: 0; border-radius: 3px;
      font-family: var(--f-sans); font-weight: 500; font-size: 13px;
      letter-spacing: .01em; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
      text-decoration: none;
    }
    .btn-back  { flex: 0 0 auto; background: #fff; color: var(--ink); border: 1px solid var(--rule-strong) !important; padding: .75rem 1rem !important; }
    .btn-print { background: var(--ink); color: var(--paper); }
    .btn-print:hover { background: #000; }
    .btn-wa    { background: #128C4B; color: #fff; }
    .btn-wa:hover { background: #0F7A41; }

    /* The invoice paper */
    .inv {
      max-width: 780px; margin: 0 auto;
      background: var(--paper);
      padding: 3rem 2.5rem 2.5rem;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,.25), 0 1px 3px rgba(0,0,0,.05);
      border: 1px solid var(--rule);
    }

    /* Editorial nameplate — centered serif wordmark, thin ochre rule,
       small-caps INVOICE label. Replaces the gradient-gold header. */
    .inv-top {
      text-align: center;
      padding-bottom: 1.8rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .inv-top::after {
      content: ""; display: block;
      width: 42px; height: 1px; background: var(--ochre);
      margin: 1.2rem auto 0;
    }
    .brand {
      font-family: var(--f-serif); font-weight: 400;
      font-size: 34px; letter-spacing: -0.01em; color: var(--ink);
      line-height: 1;
    }
    .brand .today { font-style: italic; font-weight: 300; color: var(--ochre); margin-left: 1px; }
    .shop-line {
      margin-top: .55rem;
      font-size: 12.5px; color: var(--mute);
    }
    .tax-tag {
      margin-top: 1.4rem;
      font-family: var(--f-sans); font-weight: 500;
      font-size: 10.5px; letter-spacing: .32em; text-transform: uppercase;
      color: var(--mute);
    }

    /* Parties block — two columns, small-caps labels, tabular numbers */
    .parties { display: flex; justify-content: space-between; gap: 2.5rem; margin-bottom: 2rem; }
    .party { flex: 1; }
    .party h4 {
      font-size: 9.5px; text-transform: uppercase; letter-spacing: .22em;
      color: var(--mute); margin-bottom: .5rem; font-weight: 500;
    }
    .party .nm {
      font-family: var(--f-serif); font-weight: 400;
      font-size: 17px; color: var(--ink); margin-bottom: .3rem;
      letter-spacing: -0.005em;
    }
    .party div { font-size: 12.5px; color: #4A473F; line-height: 1.65; }
    .meta { text-align: right; font-size: 12.5px; color: #4A473F; line-height: 1.75; margin-top: .4rem; }
    .meta b { color: var(--ink); font-weight: 500; }

    /* Line-items table */
    table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-variant-numeric: tabular-nums lining-nums; }
    th {
      background: transparent; color: var(--mute);
      font-size: 10px; text-transform: uppercase; letter-spacing: .22em;
      font-weight: 500;
      padding: .8rem .5rem;
      border-bottom: 1px solid var(--rule-strong);
      text-align: left;
    }
    th.r, td.r { text-align: right; }
    td {
      padding: 1rem .5rem;
      font-size: 13px;
      border-bottom: 1px solid var(--rule);
      color: var(--ink);
    }
    td:first-child { font-family: var(--f-serif); font-weight: 400; font-size: 15px; letter-spacing: -0.005em; }

    /* Totals */
    .totals { margin-left: auto; width: 320px; font-variant-numeric: tabular-nums lining-nums; }
    .totals .tr {
      display: flex; justify-content: space-between;
      padding: .5rem 0; font-size: 13px; color: #4A473F;
    }
    .totals .tr.grand {
      border-top: 1px solid var(--ink); margin-top: .5rem; padding-top: .9rem;
      font-family: var(--f-serif); font-weight: 400;
      font-size: 22px; color: var(--ink);
      letter-spacing: -0.005em;
    }
    .totals .tr.grand span:first-child {
      font-family: var(--f-sans); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: .22em;
      color: var(--mute); align-self: center;
    }
    /* Amount-in-words — italic serif, no colored panel */
    .words {
      margin-top: 1.5rem;
      font-family: var(--f-serif); font-style: italic; font-weight: 300;
      font-size: 13.5px; color: #4A473F;
      padding-top: 1rem; border-top: 1px solid var(--rule);
      letter-spacing: 0;
    }
    .words::before { content: "In words: "; font-style: normal; font-family: var(--f-sans); text-transform: uppercase; font-size: 9.5px; letter-spacing: .22em; color: var(--mute); margin-right: .5rem; }
    .foot {
      margin-top: 2rem; padding-top: 1rem;
      border-top: 1px solid var(--rule);
      font-size: 10.5px; color: var(--mute);
      text-align: center; line-height: 1.7;
      letter-spacing: .04em;
    }
    .err { max-width: 780px; margin: 2rem auto; background: var(--paper); padding: 2rem; text-align: center; color: #A94438; border: 1px solid var(--rule); border-radius: 3px; }

    /* Payment status pill + UPI QR block (mirrors invoice-view.html) */
    .pay-pill { display: inline-flex; align-items: center; gap: .35rem; padding: .28rem .6rem; border-radius: 999px; font-size: 10px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; }
    .pay-pill.paid    { color: #3E6236; border: 1px solid rgba(62,98,54,.4);   background: rgba(62,98,54,.06); }
    .pay-pill.partial { color: var(--ochre); border: 1px solid var(--ochre-line); background: rgba(168,120,51,.05); }
    .pay-pill.unpaid  { color: #A94438; border: 1px solid rgba(169,68,56,.35); background: rgba(169,68,56,.05); }
    .pay-block { margin-top: 2rem; padding: 1.4rem 1.2rem; border: 1px solid var(--rule-strong); background: #F5EFE1; border-radius: 3px; display: grid; grid-template-columns: auto 1fr; gap: 1.3rem; align-items: center; }
    .pay-block canvas, .pay-block img { display: block; width: 132px; height: 132px; background: #fff; padding: 8px; border: 1px solid var(--rule); border-radius: 3px; }
    .pay-block .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .22em; color: var(--mute); font-weight: 500; margin-bottom: .35rem; }
    .pay-block .h   { font-family: var(--f-serif); font-size: 20px; color: var(--ink); letter-spacing: -.005em; line-height: 1.2; }
    .pay-block .h em { font-style: italic; color: var(--ochre); font-weight: 300; }
    .pay-block .sub { font-size: 12.5px; color: #4A473F; line-height: 1.55; margin-top: .55rem; }
    .pay-block .upi { font-family: var(--f-sans); font-size: 11.5px; color: var(--mute); margin-top: .4rem; letter-spacing: .02em; }
    .pay-status-line { margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .pay-actions { margin-top: 1rem; display: flex; gap: .5rem; }
    .pay-actions button { flex: 1; padding: .7rem .9rem; background: transparent; border: 1px solid var(--rule-strong); color: var(--ink); border-radius: 3px; font-family: var(--f-sans); font-size: 12px; font-weight: 500; letter-spacing: .01em; cursor: pointer; }
    .pay-actions button.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .pay-actions button:hover { border-color: var(--ochre); }
    .no-upi-note { margin-top: 1rem; padding: .9rem 1rem; background: #F5EFE1; border: 1px dashed var(--rule-strong); border-radius: 3px; font-size: 12px; color: #4A473F; line-height: 1.55; }
    .no-upi-note a { color: var(--ochre); text-decoration: underline; }

    @media print {
      body { background: #fff; padding: 0; }
      .actions, .pay-actions { display: none; }
      .inv { box-shadow: none; border: 0; max-width: 100%; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="actions">
    <a class="btn-back" href="/app.html">← Back</a>
    <button class="btn-print" onclick="window.print()">Print</button>
    <button class="btn-print" id="pdfBtn">Download PDF</button>
    <button class="btn-print" id="copyBtn" style="background:#4A473F">Copy link</button>
    <button class="btn-wa" id="waBtn">Send on WhatsApp</button>
  </div>
  <div id="root"><div class="err">Loading invoice…</div></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/config.js?v=5"></script>
  <script>
    const API_BASE = window.API_BASE || 'http://127.0.0.1:4000';
    const token = localStorage.getItem('jwl_token');
    const id = new URLSearchParams(location.search).get('id');
    const fmt = n => '₹' + Number(n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});

    // Number → Indian-English words (rupees).
    function inWords(num){
      num = Math.round(num);
      if (num === 0) return 'Zero Rupees';
      const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
      const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
      const two=n=> n<20?a[n]:b[Math.floor(n/10)]+(n%10?' '+a[n%10]:'');
      const three=n=>{const h=Math.floor(n/100),r=n%100;return (h?a[h]+' Hundred'+(r?' ':''):'')+(r?two(r):'');};
      let out='', crore=Math.floor(num/1e7); num%=1e7;
      let lakh=Math.floor(num/1e5); num%=1e5;
      let thou=Math.floor(num/1e3); num%=1e3;
      if(crore) out+=three(crore)+' Crore ';
      if(lakh) out+=three(lakh)+' Lakh ';
      if(thou) out+=three(thou)+' Thousand ';
      if(num) out+=three(num);
      return out.trim()+' Rupees Only';
    }

    let sale=null, seller=null;

    async function load(){
      if(!token){ location.href='jeweller-login.html'; return; }
      if(!id){ document.getElementById('root').innerHTML='<div class="err">No invoice id.</div>'; return; }
      try{
        const [sr, mr] = await Promise.all([
          fetch(`${API_BASE}/api/sales/${id}`, {headers:{Authorization:`Bearer ${token}`}}),
          fetch(`${API_BASE}/api/jewellers/me`, {headers:{Authorization:`Bearer ${token}`}}),
        ]);
        if(sr.status===401){ location.href='jeweller-login.html'; return; }
        if(!sr.ok) throw new Error('Invoice not found');
        sale = await sr.json();
        seller = await mr.json();
        render();
      }catch(e){ document.getElementById('root').innerHTML=`<div class="err">${e.message}</div>`; }
    }

    function render(){
      const s=sale, j=seller;
      const date = new Date(s.sold_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
      // Intra-state GST split (CGST + SGST). Gujarat shop → Gujarat buyer assumed.
      const half = (s.gst_amount||0)/2;
      document.getElementById('root').innerHTML = `
      <div class="inv">
        <div class="inv-top">
          <div class="brand">Sona<span class="today">today</span></div>
          <div class="shop-line">${j.name||''}${j.area?(' &middot; '+j.area):''}</div>
          <div class="tax-tag">Tax Invoice</div>
        </div>

        <div class="parties">
          <div class="party">
            <h4>Seller</h4>
            <div class="nm">${j.name||'—'}</div>
            <div>${j.address_line||j.area||''}</div>
            <div>${j.phone?j.phone:''}</div>
            <div>${j.gst_number?('GSTIN &nbsp;'+j.gst_number):'<i style="color:#bbb">GSTIN not set</i>'}</div>
            <div>${j.bis_license?('BIS &nbsp;'+j.bis_license):''}</div>
          </div>
          <div class="party" style="text-align:right">
            <h4>Billed to</h4>
            <div class="nm">${s.customer_name||'Walk-in'}</div>
            <div>${s.customer_phone?s.customer_phone:''}</div>
            <div>${s.customer_gstin?('GSTIN &nbsp;'+s.customer_gstin):''}</div>
            <div class="meta"><b>Invoice</b> &nbsp;${s.invoice_number}<br><b>Date</b> &nbsp;${date}</div>
          </div>
        </div>

        <table>
          <thead><tr>
            <th>Description</th><th>HSN</th><th class="r">Purity</th><th class="r">Wt (g)</th>
            <th class="r">Rate/g</th><th class="r">Gold Value</th><th class="r">Making</th><th class="r">Taxable</th>
          </tr></thead>
          <tbody><tr>
            <td>${s.description||'Gold jewellery'}</td>
            <td>7113</td>
            <td class="r">${s.purity}K</td>
            <td class="r">${s.weight_g}</td>
            <td class="r">${fmt(s.rate_per_g)}</td>
            <td class="r">${fmt(s.gold_value)}</td>
            <td class="r">${fmt(s.making_amount)}</td>
            <td class="r">${fmt((s.gold_value||0)+(s.making_amount||0))}</td>
          </tr></tbody>
        </table>

        <div class="totals">
          <div class="tr"><span>Taxable value</span><span>${fmt((s.gold_value||0)+(s.making_amount||0))}</span></div>
          <div class="tr"><span>CGST @ ${(s.gst_pct/2)}%</span><span>${fmt(half)}</span></div>
          <div class="tr"><span>SGST @ ${(s.gst_pct/2)}%</span><span>${fmt(half)}</span></div>
          ${exchangeRows(s)}
          <div class="tr grand"><span>Total${(s.ex_value||0)>0?' payable':''}</span><span>${fmt(s.total)}</span></div>
        </div>

        <div class="words">${inWords(s.total)}</div>

        ${renderPaymentBlock(s, j)}

        <div class="foot">
          This is a computer-generated tax invoice. Gold rate as quoted on date of sale.<br>
          Generated via SonaToday · sonatoday.com
        </div>
      </div>`;

      // ── WhatsApp share — sends the actual PDF, not just text ──
      document.getElementById('waBtn').onclick   = shareInvoice;
      document.getElementById('pdfBtn').onclick  = downloadPdfOnly;
      document.getElementById('copyBtn').onclick = copyPublicLink;
      // Payment action wiring — only present when there's a balance.
      const recordBtn = document.getElementById('recordPayBtn');
      const paidBtn   = document.getElementById('markPaidBtn');
      if (recordBtn) recordBtn.onclick = () => recordPayment(false);
      if (paidBtn)   paidBtn.onclick   = () => recordPayment(true);
      // Draw the UPI QR after the DOM is in place.
      drawUpiQr(s, seller);
    }

    // Exchange-credit rows for the totals block. Empty string when
    // the sale had no old-gold trade-in.
    function exchangeRows(s){
      const ex = Number(s.ex_value) || 0;
      if (ex <= 0) return '';
      const detail = `${s.ex_weight_g}g ${s.ex_purity}K @ ${fmt(s.ex_rate_per_g)}/g` +
        ((Number(s.ex_deduction_pct)||0) > 0 ? ` − ${s.ex_deduction_pct}%` : '');
      return `
        <div class="tr"><span>Gross total</span><span>${fmt(s.gross_total || ((s.total||0)+ex))}</span></div>
        <div class="tr"><span>Less: old gold exchange<br><i style="font-size:10.5px;color:var(--mute)">${detail}</i></span><span style="color:#3E6236">− ${fmt(ex)}</span></div>`;
    }

    // ─────────── UPI PAYMENT HELPERS ───────────
    // UPI deep-link URI per NPCI spec.
    function upiUri(sale, jew){
      if (!jew || !jew.upi_id) return null;
      const balance = Math.max(0, (sale.total || 0) - (sale.amount_paid || 0));
      if (balance <= 0) return null;
      const params = new URLSearchParams({
        pa: jew.upi_id,
        pn: jew.name || 'SonaToday',
        am: balance.toFixed(2),
        tn: `Invoice ${sale.invoice_number || ''}`.trim(),
        cu: 'INR',
      });
      return `upi://pay?${params.toString()}`;
    }

    function renderPaymentBlock(sale, jew){
      const paid = Number(sale.amount_paid) || 0;
      const total = Number(sale.total) || 0;
      const balance = Math.max(0, total - paid);
      const status = sale.payment_status || (balance <= 0 ? 'paid' : (paid > 0 ? 'partial' : 'unpaid'));
      const label = status === 'paid' ? 'Paid in full' : status === 'partial' ? 'Partly paid' : 'Payment due';
      const statusLine = balance > 0
        ? `<div class="pay-status-line"><span class="pay-pill ${status}">${label}</span><span style="font-family:var(--f-serif);font-size:20px;color:var(--ink);letter-spacing:-.005em">${fmt(balance)} <span style="font-family:var(--f-sans);font-size:10px;text-transform:uppercase;letter-spacing:.22em;color:var(--mute)">balance</span></span></div>`
        : `<div class="pay-status-line"><span class="pay-pill paid">${label}</span><span style="font-size:11.5px;letter-spacing:.06em;color:var(--mute)">${paid > 0 ? fmt(paid) + ' received' : ''}</span></div>`;
      const controls = balance > 0
        ? `<div class="pay-actions">
             <button id="recordPayBtn">Record partial payment</button>
             <button id="markPaidBtn" class="primary">Mark paid in full</button>
           </div>`
        : '';
      if (!upiUri(sale, jew)) {
        // No UPI configured — show a hint so the jeweller sets it once.
        return `${statusLine}${controls}
          ${balance > 0 ? `<div class="no-upi-note">Add your UPI ID under Profile to embed a payment QR on every invoice. Customers can then scan and pay in one tap.</div>` : ''}`;
      }
      return `
        ${statusLine}
        <div class="pay-block">
          <div id="upiQr"></div>
          <div>
            <div class="lbl">Pay via UPI</div>
            <div class="h">Scan to settle <em>${fmt(balance)}</em></div>
            <div class="sub">Customer opens any UPI app (GPay, PhonePe, Paytm, bank app), scans this code, and pays directly to ${jew.name || 'you'}.</div>
            <div class="upi">${jew.upi_id}</div>
          </div>
        </div>
        ${controls}`;
    }

    function drawUpiQr(sale, jew){
      const host = document.getElementById('upiQr');
      const uri  = upiUri(sale, jew);
      if (!host || !uri || typeof QRCode === 'undefined') return;
      host.innerHTML = '';
      new QRCode(host, {
        text: uri,
        width: 132, height: 132,
        colorDark:  '#1B1A17',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    // POST /api/sales/:id/payment. If mark-paid-in-full: send the
    // full remaining balance. Otherwise prompt for an amount.
    async function recordPayment(fullBalance){
      const balance = Math.max(0, (sale.total || 0) - (sale.amount_paid || 0));
      if (balance <= 0) { alert('This invoice is already fully paid.'); return; }
      let amount = balance;
      if (!fullBalance) {
        const raw = prompt(`Amount received (₹). Balance is ${Math.round(balance).toLocaleString('en-IN')}.`, String(Math.round(balance)));
        if (raw == null) return;   // cancelled
        amount = parseFloat(String(raw).replace(/[^0-9.]/g, ''));
        if (!Number.isFinite(amount) || amount <= 0) { alert('Enter a valid amount.'); return; }
      }
      try {
        const r = await fetch(`${API_BASE}/api/sales/${sale.id}/payment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ amount }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Payment record failed');
        // Reflect on the loaded sale and re-render.
        sale.amount_paid    = data.amount_paid;
        sale.payment_status = data.payment_status;
        render();
      } catch (err) {
        alert(err.message);
      }
    }

    // Copies the public /invoice-view.html link to the clipboard so
    // the jeweller can paste it into SMS, email, or a chat other than
    // WhatsApp. Falls back to a legacy execCommand path on browsers
    // that gate navigator.clipboard.writeText behind HTTPS in prod
    // but not in some embedded webviews.
    async function copyPublicLink(){
      if (!sale || !sale.public_sig) {
        alert('Invoice not loaded yet — please wait a second and try again.');
        return;
      }
      const url = publicInvoiceUrl();
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      const ok = () => {
        btn.textContent = '✅ Link copied';
        setTimeout(() => { btn.textContent = orig; }, 1600);
      };
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(url);
          ok();
          return;
        }
      } catch { /* fall through to legacy path */ }
      // Legacy fallback — briefly render a hidden textarea and copy.
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); ok(); }
      catch { prompt('Copy this link:', url); }
      finally { ta.remove(); }
    }

    // Build the public, tokenised view-link the customer taps to see
    // the GST invoice in their browser (no app, no download required).
    function publicInvoiceUrl(){
      // Prefer the production origin so the link works after the
      // customer leaves the page — but fall back to whatever origin
      // is currently serving the page (handy in local dev).
      const isLocal = /^(localhost|127\.0\.0\.1)/.test(location.hostname);
      const base = isLocal ? location.origin : 'https://sonatoday.com';
      return `${base}/invoice-view.html?id=${sale.id}&sig=${encodeURIComponent(sale.public_sig||'')}`;
    }

    // Thank-you message that goes with the link.
    function shareMessage(){
      const s=sale, j=seller;
      const date = new Date(s.sold_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
      return `🙏 *Thank you for shopping with ${j.name}!*\n\n`+
        `Your tax invoice is ready — tap the link below to view, save or print it.\n\n`+
        `🧾 ${s.invoice_number} · ${date}\n`+
        `${s.description||'Gold jewellery'} — ${s.weight_g}g ${s.purity}K\n`+
        `*Total: ₹${Math.round(s.total).toLocaleString('en-IN')}*\n\n`+
        `📄 ${publicInvoiceUrl()}\n\n`+
        `We look forward to serving you again. ✨`;
    }

    // Render the on-screen invoice to a real A4 PDF Blob.
    async function buildPdfBlob(){
      const el = document.querySelector('.inv');
      const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
      const img = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageW = pdf.internal.pageSize.getWidth();
      const imgH = canvas.height * pageW / canvas.width;
      pdf.addImage(img, 'PNG', 0, 0, pageW, imgH);
      return pdf.output('blob');
    }

    /* ──────────────────────────────────────────────────────────
       shareInvoice — runs on the WhatsApp button click.

       The new model: we don't attach a PDF at all. Instead we
       send a tap-to-view PUBLIC LINK (/invoice-view.html?id&sig)
       which renders the same GST invoice in the customer's
       browser and offers Print / Download PDF buttons of its own.

       Benefits over the old PDF-attachment flow:
       • Zero PDF generation on the jeweller side — no more
         hourglass-forever bug, no popup-blocker race.
       • Works on EVERY device (mobile + desktop) identically.
       • Customer can re-open the invoice any time from chat
         history; jeweller doesn't have to re-send the PDF.
    ──────────────────────────────────────────────────────────── */
    function shareInvoice(){
      if (!sale || !sale.public_sig) {
        alert('Invoice not loaded yet — please wait a second and try again.');
        return;
      }
      const ph  = (sale.customer_phone||'').replace(/[^0-9]/g,'');
      const msg = shareMessage();
      // wa.me works without a phone too — opens WhatsApp's contact picker.
      const waUrl = `https://wa.me/${ph}?text=${encodeURIComponent(msg)}`;
      const win = window.open(waUrl, '_blank');
      if (!win) {
        // Popup blocked — fall back to a same-tab navigation so the
        // click still gets the customer to WhatsApp.
        location.href = waUrl;
      }
    }

    // Standalone "Download PDF" button — always works, no WhatsApp.
    async function downloadPdfOnly(){
      const btn = document.getElementById('pdfBtn');
      const orig = btn.textContent;
      btn.textContent = '⏳ Generating…'; btn.disabled = true;
      try {
        const blob = await buildPdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download=`${sale.invoice_number}.pdf`; a.click();
        URL.revokeObjectURL(url);
      } catch(err){
        console.warn(err);
        alert('PDF generation failed. Try the 🖨 Print button → "Save as PDF".');
      } finally { btn.textContent = orig; btn.disabled = false; }
    }

    load();
  </script>
</body>
</html>

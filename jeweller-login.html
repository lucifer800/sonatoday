<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1e" />
  <title>Jeweller Login — SonaToday</title>
  <!-- PWA install support (so the app is installable from the login page too) -->
  <link rel="manifest" href="/app-manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SonaToday" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@400;500;600&display=swap" />
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .login-wrap   { max-width: 420px; margin: 2.5rem auto; padding: 0 1rem; }
    .login-card   { background: var(--card); border: 1px solid rgba(241,235,221,.09); border-radius: 4px; padding: 2rem 1.75rem; box-shadow: 0 20px 50px -20px rgba(0,0,0,.5); }
    .login-brand  { text-align: center; margin-bottom: 1.4rem; padding-bottom: 1.1rem; border-bottom: 1px solid rgba(176,134,51,.28); }
    .login-brand .logo {
      font-family: 'Fraunces', Georgia, serif; font-weight: 400;
      font-size: 30px; letter-spacing: -0.01em; color: var(--white);
    }
    .login-brand .logo .today { font-style: italic; font-weight: 300; color: #C89F55; margin-left: 1px; }
    .login-brand .tag  { color: var(--muted); font-size: 10.5px; margin-top: .35rem; text-transform: uppercase; letter-spacing: .16em; font-weight: 500; }
    .login-title  { font-size: 1.3rem; font-weight: 700; margin: 0 0 .25rem; }
    .login-sub    { color: var(--muted); font-size: 13px; margin: 0 0 1.25rem; }
    .login-field  { margin-bottom: 1rem; }
    .login-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .5px; }
    /* Bigger touch targets — 48 px min on phones */
    .login-field input { width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.25); border: 1px solid var(--acc-border); color: var(--text); padding: .9rem 1rem; border-radius: 10px; font-size: 16px; min-height: 48px; }
    .login-field input:focus { outline: none; border-color: var(--acc); }
    .pwd-wrap     { position: relative; }
    .pwd-toggle   { position: absolute; right: .6rem; top: 50%; transform: translateY(-50%); background: none; border: 0; color: var(--muted); padding: .35rem .5rem; font-size: 12px; cursor: pointer; }
    .pwd-toggle:hover { color: var(--acc); }
    .login-btn    { width: 100%; background: var(--acc); color: #000; border: 0; padding: 1rem; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; min-height: 52px; box-shadow: 0 6px 18px -6px rgba(212,175,55,0.5); }
    .login-btn:hover    { filter: brightness(1.08); }
    .login-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
    .login-msg    { margin-top: 1rem; padding: .65rem .85rem; border-radius: 8px; font-size: 13px; display: none; }
    .login-msg.err { background: rgba(239,68,68,0.1); color: #f87171; display: block; }
    .login-msg.ok  { background: rgba(34,197,94,0.1); color: #4ade80; display: block; }
    .login-back   { display: inline-block; margin-bottom: 1rem; color: var(--muted); text-decoration: none; font-size: 12px; }
    .login-back:hover { color: var(--acc); }
    .login-hint   { margin-top: 1rem; padding: .65rem .8rem; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 11px; color: var(--muted); line-height: 1.5; display: none; }
    .login-hint code { color: var(--acc); }
    .login-foot   { text-align: center; margin-top: 1rem; font-size: 12px; color: var(--muted); }
    .login-foot a { color: var(--acc); text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <a class="login-back" href="index.html">← Back to comparison</a>
    <div class="login-card">
      <div class="login-brand">
        <div class="logo">Sona<span class="today">today</span></div>
        <div class="tag">Jeweller Portal</div>
      </div>
      <h1 class="login-title" style="font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:1.55rem;letter-spacing:-.015em">Sign in</h1>
      <p class="login-sub">Manage your shop's daily rates, stock and clients.</p>

      <form id="loginForm">
        <div class="login-field">
          <label for="email">Email</label>
          <input id="email" type="email" inputmode="email" required autocomplete="username" placeholder="shop@example.com" />
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <div class="pwd-wrap">
            <input id="password" type="password" required autocomplete="current-password" />
            <button type="button" id="pwdToggle" class="pwd-toggle" aria-label="Show password">Show</button>
          </div>
        </div>
        <button id="loginBtn" type="submit" class="login-btn">Sign in</button>
      </form>

      <div id="loginMsg" class="login-msg"></div>

      <div class="login-hint" id="demoHint">
        <strong>Local demo:</strong> seeded emails (e.g. <code>tanishq@ahm.com</code>) with password <code>pass123</code>.
      </div>

      <div class="login-foot">
        Not on SonaToday yet? <a href="jeweller-signup.html">Create your shop in 2 minutes →</a>
      </div>
    </div>
  </div>

  <script src="/config.js?v=5"></script>
  <script>
    const API_BASE = window.API_BASE || 'http://127.0.0.1:4000';

    // Register the service worker so the login page is PWA-installable too.
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

    // Only show the demo-credentials hint on localhost — production
    // jewellers shouldn't see seeded-account credentials in the wild.
    const isLocal = ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
    if (isLocal) document.getElementById('demoHint').style.display = 'block';

    // Show/hide password toggle
    const pwdInput  = document.getElementById('password');
    const pwdToggle = document.getElementById('pwdToggle');
    pwdToggle.addEventListener('click', () => {
      const showing = pwdInput.type === 'text';
      pwdInput.type = showing ? 'password' : 'text';
      pwdToggle.textContent = showing ? 'Show' : 'Hide';
    });

    // If already logged in, jump straight to the dashboard
    if (localStorage.getItem('jwl_token')) {
      window.location.href = 'app.html';
    }

    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('loginMsg');
    const btn  = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'login-msg';
      btn.disabled = true; btn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch(`${API_BASE}/api/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('jwl_token', data.token);
        localStorage.setItem('jwl_user',  JSON.stringify(data.user));

        msg.className   = 'login-msg ok';
        msg.textContent = 'Signed in. Redirecting…';
        setTimeout(() => { window.location.href = 'app.html'; }, 400);
      } catch (err) {
        msg.className   = 'login-msg err';
        msg.textContent = err.message;
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>

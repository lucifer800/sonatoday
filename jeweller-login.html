<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Jeweller Login — Ahmedabad Gold & Silver Rates</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-wrap   { max-width: 420px; margin: 4rem auto; padding: 0 1rem; }
    .login-card   { background: var(--card); border: 1px solid var(--acc-border); border-radius: 16px; padding: 2rem; }
    .login-title  { font-size: 1.5rem; font-weight: 700; margin: 0 0 .35rem; }
    .login-sub    { color: var(--muted); font-size: 13px; margin: 0 0 1.5rem; }
    .login-field  { margin-bottom: 1rem; }
    .login-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .5px; }
    .login-field input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.04); border: 1px solid var(--acc-border); color: var(--text); padding: .75rem .85rem; border-radius: 8px; font-size: 14px; }
    .login-field input:focus { outline: none; border-color: var(--acc); }
    .login-btn    { width: 100%; background: var(--acc); color: #000; border: 0; padding: .85rem; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }
    .login-btn:hover    { filter: brightness(1.1); }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }
    .login-msg    { margin-top: 1rem; padding: .65rem .85rem; border-radius: 8px; font-size: 13px; display: none; }
    .login-msg.err { background: rgba(239,68,68,0.1); color: #f87171; display: block; }
    .login-msg.ok  { background: rgba(34,197,94,0.1); color: #4ade80; display: block; }
    .login-back   { display: inline-block; margin-bottom: 1rem; color: var(--acc); text-decoration: none; font-size: 13px; }
    .login-hint   { margin-top: 1rem; padding: .75rem; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 11px; color: var(--muted); line-height: 1.5; }
    .login-hint code { color: var(--acc); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <a class="login-back" href="index.html">← Back to dashboard</a>
    <div class="login-card">
      <h1 class="login-title">Jeweller Login</h1>
      <p class="login-sub">Sign in to manage your rates and profile.</p>

      <form id="loginForm">
        <div class="login-field">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="username" />
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input id="password" type="password" required autocomplete="current-password" />
        </div>
        <button id="loginBtn" type="submit" class="login-btn">Sign in</button>
      </form>

      <div id="loginMsg" class="login-msg"></div>

      <div class="login-hint">
        <strong>Demo logins:</strong> any of the 15 seeded emails (e.g. <code>tanishq@ahm.com</code>, <code>malabar@ahm.com</code>) with password <code>pass123</code>.
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const API_BASE = window.API_BASE || 'http://127.0.0.1:4000';

    // If already logged in, jump straight to the dashboard
    if (localStorage.getItem('jwl_token')) {
      window.location.href = 'jeweller-dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('loginMsg');
    const btn  = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'login-msg';
      btn.disabled = true; btn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch(`${API_BASE}/api/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('jwl_token', data.token);
        localStorage.setItem('jwl_user',  JSON.stringify(data.user));

        msg.className   = 'login-msg ok';
        msg.textContent = 'Signed in. Redirecting…';
        setTimeout(() => { window.location.href = 'jeweller-dashboard.html'; }, 400);
      } catch (err) {
        msg.className   = 'login-msg err';
        msg.textContent = err.message;
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
